<div class="mat-elevation-z8"  style="overflow-y: auto; max-height: 100%;">
    <table mat-table [dataSource]="tableData" matSort class="w-full">
  
      <ng-container *ngFor="let column of displayedColumns; let i = index" [matColumnDef]="column">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          {{ columnHeaders[i] }}
        </th>
        <td mat-cell *matCellDef="let element" (click)="onRowClick(element)">
          <ng-container *ngIf="column === 'action' || column === 'actions'; else normalCell">
            <button type="button" class="action-btn" (click)="onActionClick($event, element)">
              <i class="fa-solid fa-pen-to-square"></i>
              Edit
            </button>
          </ng-container>
          <ng-template #normalCell>
            {{ element[column] }}
          </ng-template>
        </td>
      </ng-container>
  
      <!-- FIX: Use displayedColumns -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
