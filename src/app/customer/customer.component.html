    <!-- Header -->
    <div class="header">
        <h1>Customer Management</h1>
        <p>Add new customers and manage your customer database</p>
    </div>

    <div class="main-content" >
        <!-- Customer Addition Form -->
        <div class="customer-form-section" style="max-height: 50%;width: 30%;">
            <h2 class="form-title">Add New Customer</h2>
            <form id="customerForm">
                <div class="form-group">
                    <label class="form-label" for="customerName">Customer Name *</label>
                    <input type="text" id="customerName" name="customerName" class="form-input"
                        [(ngModel)]="customerName" placeholder="Enter customer name" required>
                </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" [(ngModel)]="customerEmail"
                            placeholder="customer@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-input" [(ngModel)]="customerPhone"
                            placeholder="+1 (555) 123-4567">
                    </div>
                <div class="form-group">
                    <label class="form-label" for="points">Points</label>
                    <input type="number" id="ponts" name="Points" class="form-input" [(ngModel)]="customerPoints"
                        placeholder="Enter Points ">
                </div>
                <div class="form-group">
                    <label class="form-label" for="address">Address</label>
                    <input type="text" id="address" name="address" class="form-input" [(ngModel)]="customerAddress"
                        placeholder="Street address">
                </div>


                <div class="form-group">
                    <label class="form-label" for="customerType">Customer Type</label>
                    <select id="customerType" name="customerType" class="form-input" [(ngModel)]="customertype"
                        required>
                        <option value="">Select customer type</option>
                        <option value="regular">Regular</option>
                        <option value="premium">Premium</option>
                        <option value="vip">VIP</option>
                    </select>
                </div>

                <div class="form-group" style="display: flex;">
                    <button type="submit" class="btn btn-primary" (click)="addCustomer()">Add Customer</button>
                    <button type="reset" class="btn btn-secondary" (click)="clear()">Clear Form</button>
                </div>
            </form>
        </div>

        <!-- Customer List -->
        <!-- Customer List -->
        <div style="max-height: 50%;width: 70%;">
            <h2 class="form-title">Customer List</h2>

            <div class="search-container">
                <input type="text" id="searchCustomer" class="search-input" placeholder="Search customers...">
            </div>
            <app-tableview [tableData]="customerData" [columnHeaders]="ColumnHeaders"
                [displayedColumns]="displayedColumns" (actionClick)="onTableAction($event)"></app-tableview>

            <div *ngIf="showEditModal" class="modal-overlay" style="position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.45); z-index: 1000;">
                <div class="modal-box" style="width: 520px; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 18px 50px rgba(0,0,0,0.25);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;">
                        <h3 style="margin:0;">Edit Customer</h3>
                        <button type="button" (click)="closeEditModal()" style="background: transparent; border: none; font-size: 24px; cursor: pointer;">&times;</button>
                    </div>
                    <form (ngSubmit)="saveCustomerEdit()">
                        <div class="form-group">
                            <label class="form-label" for="editCustomerName">Customer Name *</label>
                            <input id="editCustomerName" name="editCustomerName" type="text" class="form-input" [(ngModel)]="editingCustomer.name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="editCustomerEmail">Email Address</label>
                            <input id="editCustomerEmail" name="editCustomerEmail" type="email" class="form-input" [(ngModel)]="editingCustomer.email">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="editCustomerPhone">Phone Number</label>
                            <input id="editCustomerPhone" name="editCustomerPhone" type="tel" class="form-input" [(ngModel)]="editingCustomer.phone">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="editCustomerPoints">Points</label>
                            <input id="editCustomerPoints" name="editCustomerPoints" type="number" class="form-input" [(ngModel)]="editingCustomer.points">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="editCustomerAddress">Address</label>
                            <input id="editCustomerAddress" name="editCustomerAddress" type="text" class="form-input" [(ngModel)]="editingCustomer.address">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="editCustomerType">Customer Type</label>
                            <select id="editCustomerType" name="editCustomerType" class="form-input" [(ngModel)]="editingCustomer.type">
                                <option value="">Select customer type</option>
                                <option value="regular">Regular</option>
                                <option value="premium">Premium</option>
                                <option value="vip">VIP</option>
                            </select>
                        </div>
                        <div class="form-group" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px;">
                            <button type="button" class="btn btn-secondary" (click)="closeEditModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary" (click)="saveCustomerEdit()">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
